spring.application.name=smart-inventory-backend
server.port=8080

# ---- MySQL ----
spring.datasource.url=jdbc:mysql://localhost:3306/smart_inventory?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=root
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ---- JPA / Hibernate ----
# Use 'validate' or 'none' since schema.sql manages the schema.
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.open-in-view=false

# ---- JWT ----
app.jwt.secret=ChangeThisToALongRandomSecretKeyForSmartInventory2026SuperSecure
app.jwt.expiration-ms=86400000

# ---- Flask AI service ----
app.ai.base-url=http://localhost:5001

# ---- CORS ----
app.cors.allowed-origins=http://localhost:5173,http://localhost:3000
